---
name: run tox test and lint

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:

  quality:
    retry: 2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Set up the cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: cache-python-packages

      - name: Set up the project
        run: |
          pip install poetry safety tox
          # poetry config virtualenvs.in-project true

      - name: Run ruff lint
        run: tox -e lint

      - name: Run pylint
        run: tox -e pylint

  code-saftey:
    retry: 2
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v4

      - name: Assign variable
        id: safety_api_key
        run: echo '::set-output name=secret::${{secrets.SAFETY_API_KEY}}'

      - name: Run Safety CLI to check for vulnerabilities
        if: steps.secret.outputs.safety_api_key
        uses: pyupio/safety-action@v1
        with:
          # api-key: ${{ secrets.SAFETY_API_KEY }}
          args: --detailed-output  # To always see detailed output from this action
        env:  # Or as an environment variable
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}

  tests:
    retry: 2
    strategy:
      max-parallel: 6
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]  # , "3.14"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up the cache
        uses: actions/cache@v4
        env:
          cache-name: cache-python-packages
        with:
          path: .venv
          key: ${{ matrix.os }}-${{ matrix.python-version }}-${{ env.cache-name }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.python-version }}-
            ${{ matrix.os }}-

      - name: Set up the project
        run: |
          pip install poetry tox
          # poetry config virtualenvs.in-project true

      - name: Run the test suite
        run: tox -f test -l | tr '\n' ',' | xargs tox -e

  build:
    retry: 2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Set up the cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: cache-python-packages

      - name: Set up the project
        run: |
          pip install poetry safety tox
          # poetry config virtualenvs.in-project true

      # build for all versions of python ?
      - name: build
        run: poetry build
